version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: twitter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_TWITTER_USER: ${POSTGRES_TWITTER_USER}
      POSTGRES_TWITTER_PASSWORD: ${POSTGRES_TWITTER_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra:/docker-entrypoint-initdb.d
    networks:
      - twitter-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres -c logging_collector=on -c log_statement=all -c log_connections=on

  pgadmin:
    image: dpage/pgadmin4
    container_name: twitter-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - twitter-network
    depends_on:
      - postgres

networks:
  twitter-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
